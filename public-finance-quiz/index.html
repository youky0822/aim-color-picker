<head>

<title>公共財政隨機考題</title>
<style>
:root{--b:#f6f7fb;--c:#fff;--t:#111827;--m:#64748b;--l:#dbe3ef;--p:#2563eb;--ps:#eaf1ff;--g:#15803d;--gs:#eaf8ef;--r:#dc2626;--rs:#fff1f1}*{box-sizing:border-box;-webkit-tap-highlight-color:rgba(37,99,235,.14)}body{margin:0;background:var(--b);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC','Microsoft JhengHei',Arial,sans-serif;line-height:1.55;-webkit-text-size-adjust:100%}.wrap{max-width:900px;margin:auto;padding:calc(14px + env(safe-area-inset-top)) 12px calc(26px + env(safe-area-inset-bottom))}h1{font-size:28px;margin:0 0 4px}.sub{color:var(--m);font-size:14px;margin-bottom:12px}.card{background:var(--c);border:1px solid var(--l);border-radius:20px;box-shadow:0 10px 28px rgba(15,23,42,.08);padding:16px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr;gap:10px}label{display:block;color:var(--m);font-size:13px;font-weight:800;margin-bottom:5px}select,input{width:100%;min-height:48px;border:1px solid var(--l);border-radius:14px;padding:10px 12px;background:#fff;color:var(--t);font-size:16px}button{width:100%;min-height:54px;border-radius:16px;border:1px solid transparent;padding:12px 14px;font-size:17px;font-weight:900;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;appearance:none}.primary{background:var(--p);color:#fff}.secondary{background:#eef2f7;color:var(--t);border-color:#e2e8f0}.tab{background:#fff;color:var(--t);border-color:var(--l)}.tab.on{background:var(--ps);color:var(--p);border-color:var(--p)}.tabs{display:grid;grid-template-columns:1fr;gap:10px;margin:12px 0}.hidden{display:none!important}.small{color:var(--m);font-size:13px}.pill{display:inline-flex;align-items:center;border-radius:999px;background:#eef2f7;color:#334155;padding:6px 10px;font-size:13px;font-weight:900;margin:0 6px 8px 0}.pill.p{background:var(--ps);color:var(--p)}.pill.g{background:var(--gs);color:var(--g)}.pill.r{background:var(--rs);color:var(--r)}.bar{height:10px;background:#e9eef6;border-radius:999px;overflow:hidden;margin:8px 0 16px}.bar div{height:100%;width:0;background:var(--p);transition:.2s}.q{font-size:22px;font-weight:900;line-height:1.42;margin:0 0 16px}.opts{display:grid;gap:10px}.opt{min-height:62px;text-align:left;background:#fff;color:var(--t);border:1px solid var(--l);display:flex;gap:12px;align-items:flex-start;line-height:1.45;box-shadow:0 6px 14px rgba(15,23,42,.045)}.letter{flex:0 0 32px;height:32px;border-radius:10px;background:#eef2f7;display:inline-flex;align-items:center;justify-content:center;font-weight:900}.txt{padding-top:2px}.correct{border-color:var(--g);background:var(--gs);color:#0f5e36}.wrong{border-color:var(--r);background:var(--rs);color:#991b1b}.fb{display:none;margin-top:14px;border-radius:16px;border:1px solid var(--l);padding:14px;background:#fff}.fb.show{display:block}.fb.ok{border-color:#a7e3bd;background:var(--gs)}.fb.bad{border-color:#fecaca;background:var(--rs)}.fbtitle{font-size:18px;font-weight:900;margin-bottom:4px}.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.stat{border:1px solid var(--l);border-radius:16px;padding:12px;background:#fff}.num{font-size:26px;font-weight:900}.review{border:1px solid var(--l);border-radius:16px;padding:14px;background:#fff;margin:10px 0}@media(min-width:720px){.wrap{padding-top:28px}.grid{grid-template-columns:1.3fr 1.2fr .8fr .9fr}.tabs{grid-template-columns:repeat(3,1fr)}.toolbar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.q{font-size:28px}}@media(max-width:380px){.stats{grid-template-columns:1fr}h1{font-size:24px}.q{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
<header><h1>公共財政隨機考題</h1><div class="sub">手機 / iPad 版｜原始題與模擬題可分開練</div></header>
<section id="setup" class="card">
<div class="grid">
<div><label>章節</label><select id="ch"><option value="全部">全部章節</option><option>第五章</option><option>第六章</option><option>第七章</option><option>第十章</option></select></div>
<div><label>題庫來源</label><select id="src"><option value="全部">全部混合</option><option>原始題</option><option>模擬題</option></select></div>
<div><label>題數</label><input id="cnt" type="number" min="1" value="20" inputmode="numeric"></div>
<div><label>答對自動下一題</label><select id="delay"><option value="700">0.7 秒</option><option value="1000">1 秒</option><option value="1500">1.5 秒</option><option value="0">不自動</option></select></div>
</div>
<div class="tabs"><button class="tab on" data-s="全部">全部混合</button><button class="tab" data-s="原始題">只練原始題</button><button class="tab" data-s="模擬題">只練模擬題</button></div>
<div class="toolbar"><button id="start" class="primary">開始測驗</button><button id="ori" class="secondary">原始題快速開始</button><button id="gen" class="secondary">模擬題快速開始</button></div>
<p id="info" class="small"></p><p class="small">答題方式：直接點選選項。答對自動下一題；答錯顯示解析，自己按下一題。</p>
</section>
<section id="quiz" class="card hidden"><div><span id="idx" class="pill p"></span><span id="pch" class="pill"></span><span id="psrc" class="pill"></span><span id="okp" class="pill g"></span><span id="badp" class="pill r"></span></div><div class="bar"><div id="bar"></div></div><div id="qt" class="q"></div><div id="opts" class="opts"></div><div id="fb" class="fb"></div></section>
<section id="result" class="card hidden"><h2>測驗結果</h2><div class="stats"><div class="stat"><div class="small">總題數</div><div id="tn" class="num">0</div></div><div class="stat"><div class="small">答對</div><div id="cn" class="num">0</div></div><div class="stat"><div class="small">分數</div><div id="sn" class="num">0%</div></div></div><div class="toolbar" style="margin-top:12px"><button id="again" class="primary">重新開始</button><button id="wrongOnly" class="secondary">只練錯題</button></div><h3>錯題整理</h3><div id="review"></div></section>
</div>
<script>
var BANK=[];function add(ch,src,q,a,w,e){BANK.push({ch:ch,src:src,q:q,a:a,w:w,e:e||a});}
function O(ch,q,a,w,e){add(ch,'原始題',q,a,w,e)}function G(ch,q,a,w,e){add(ch,'模擬題',q,a,w,e)}
O('第五章','公共財很難由私人有效率地提供，其主要原因為何？','在消費上不具排他性',['管理上具有複雜性','在消費上不具集體消費的性質','資金需求龐大，私人難以負荷'],'公共財不具排他性，容易出現不付費也能享用的問題。');
O('第五章','造成共有資源耗竭的原因為何？','因為很多的人都可以無償地使用或消費共有資源',['因為共有資源是屬於各國政府所有','因為每個人對共有資源都擁有部分使用的權利','因為所有共有資源的資源都非常少'],'共有資源難排他且會競用，容易被過度使用。');
O('第五章','使公共財的提供產生搭便車問題的原因是：','公共財在價格上完全不具有排他性',['公共財在生產上的外部性','公共財在消費上完全不具有敵對性','公共財在生產上呈現遞增規模報酬'],'搭便車主要來自非排他性。');
O('第五章','以下何者非公共財之特性？','邊際生產成本為零',['非耗竭性','非排他性','可多人共享'],'公共財重點是非敵對性與非排他性，不是邊際生產成本必為零。');
O('第五章','下列何者是俱樂部財的特性？','均衡時的最適規模與享用人數須同時決定',['具有消費的不可拒絕性','會產生坐享其成的現象','具有非排他性'],'俱樂部財要同時決定成員人數與財貨數量。');
O('第五章','具有集體消費性，但又受一定的使用容量限制的是：','俱樂部財',['必需財','殊價財','純粹公共財'],'俱樂部財可共享，但會受容量限制。');
O('第五章','有關俱樂部財與純公共財的差異，下列敘述何者正確？','前者具有消費的排他限制，後者則無',['前者必由民間提供，後者必由政府提供','前者不具有消費的排他性，後者則有','前者不具有消費的敵對性，後者則有'],'俱樂部財通常可用會員或收費排除非成員。');
O('第五章','整個社會對公共財的需求線為何？','既定數量下，每人願付價值垂直加總',['既定數量下，每人願付價值水平加總','既定價格下，每人需求數量水平加總','既定價格下，每人需求數量垂直加總'],'公共財是同一數量共同消費，因此是願付價格垂直加總。');
O('第五章','若 A、B 二人對公共財的需求函數，A 為 2P+Q=20，B 為 P+Q=8，供給函數為 2Q-P=3，最適提供量為：','6',['3','9','18'],'公共財需求垂直加總後與供給相等，解得 Q=6。');
O('第五章','以 MB 表示公共財對個人之邊際效益，以 MC 表示邊際生產成本，公共財最適提供量之條件為：','各 MB 之和應等於 MC',['各 MB 之乘積應等於 MC','各 MB 應相等，且等於 MC','各 MB 應相等，且大於 MC'],'公共財效率條件是 ΣMB=MC。');
O('第六章','欲應用寇斯定理有效解決污染問題，須合乎下列哪一條件？','交易成本極小',['人數眾多','協商時間很長','財產權界定不須明確'],'寇斯定理需要財產權明確且交易成本很小。');
O('第六章','有關污染外部性的修正策略，下列何者錯誤？','必須使污染量降到零',['修正策略的採行必須先認清污染的原由','可課徵皮古稅以達到效率的結果','採補貼的策略，一樣可達到效率的結果'],'效率不是把污染降到零，而是降到最適水準。');
O('第六章','寇斯定理是指：','若無交易成本，可將財產權指派給污染者或被污染者，透過協商，可達柏拉圖最適水準',['政府應禁止污染行為發生','政府應對製造污染者課徵皮古稅','政府應對被污染者補貼'],'寇斯定理強調明確財產權與低交易成本下的協商。');
O('第六章','共同財產資源是：','財產權未明確定義，使用者不需付費，且資源的總量會因使用而逐漸耗竭的資源',['由一國政府所有，需取得使用執照才可使用的資源','支付租稅者才可使用，且由多數人同時共同使用的資源','由多國政府所有，需經協商分擔成本後使用的資源'],'共同財產資源因產權不明與無償使用而容易耗竭。');
O('第六章','一家工廠排放廢水影響附近居民健康，何政策可增進效率？','政府對鋼鐵工廠課徵污染稅，補貼附近居民',['政府補貼鋼鐵工廠','政府禁止鋼鐵工廠生產','集體遷村'],'污染稅可使外部成本內部化。');
O('第六章','何種矯正外部性的方法，既能管制污染總量，又能隨物價上漲而提高政府收入？','拍賣污染許可權',['課污染稅','減產補貼','確立財產權'],'拍賣污染許可權可控制總量，也可使政府取得收入。');
O('第六章','政府干預外部性問題的方式，不包括下列何者？','協商',['管制','補貼','課稅'],'協商屬於私人間處理，不是政府干預方式。');
O('第六章','當廠商生產活動有外部成本，若無干預或協商，廠商產量會：','高於柏拉圖最適水準',['剛好等於柏拉圖最適水準','低於柏拉圖最適水準','剛好等於完全競爭時的水準'],'外部成本未被廠商負擔時，市場產量會過多。');
O('第六章','以下何種活動具有外部經濟？','注射預防針',['在房間裡吸菸','看電影','開車在擁擠的高速公路上'],'預防針會降低他人感染風險，具有外部利益。');
O('第七章','大部分公用事業由政府經營或管制，主要理由為何？','自然獨占',['外部性','非排他性','非敵對性'],'公用事業常具自然獨占特性。');
O('第七章','下列何者對自然獨占事業成本結構的描述正確？','在能供應整個市場需求量的範圍內，長期平均成本曲線遞減，且長期邊際成本曲線位於長期平均成本曲線的下方',['長期平均成本曲線呈 U 字型且邊際成本通過最低點','長期平均成本曲線遞增且邊際成本位於下方','長期平均成本曲線遞減且邊際成本位於上方'],'自然獨占重點是平均成本隨產量增加而下降。');
O('第七章','採用尖峰負荷訂價法的財貨，下列何者不是其性質？','短期產能不受限',['可差別取價','需求不固定','無法儲存'],'尖峰定價通常用在產能受限、需求波動且不易儲存的財貨。');
O('第七章','公營事業民營化最主要理由是：','提高公營事業之經營效率',['可釋出股權來增加政府收入','與民爭利','政府不應經營任何營利事業'],'民營化核心理由是提高經營效率。');
O('第七章','若政府不管制自然獨占產業，則：','產業產出量低於效率水準過多，價格過高',['產出量與價格都等於柏拉圖最適','產出量低於效率水準過多，價格低於最適價格','產出量低於效率水準過多，但價格剛好等於最適價格'],'自然獨占不受管制時常有低產量、高價格。');
O('第七章','公營事業的民營化方法有：','所有選項均正確',['清算','官股公開上市或出售給員工','公有民營'],'清算、出售股權、公有民營等皆可屬民營化方式。');
O('第七章','若政府以平均成本訂價法管制自然獨占產業，則：','產品價格可望比管制前低，且產量比管制前多',['廠商一定會有虧損','廠商仍有超額利潤','廠商可賺取比管制前更多的利潤'],'平均成本訂價可使價格下降、產量增加，並讓廠商損益兩平。');
O('第七章','自然獨占事業之生產函數具有何種特性？','規模報酬遞增',['規模報酬遞減','正常報酬固定','規模報酬固定'],'自然獨占通常來自規模報酬遞增。');
O('第七章','使用公共事業產品，在兩部訂價法下，離峰時間須付何種成本？','營運成本',['營運成本與能量成本','固定成本','能量成本'],'離峰時間主要負擔營運成本。');
O('第七章','讓獨占事業利潤為零之訂價法為：','平均成本定價法',['尖峰定價法','兩部定價法','邊際成本定價法'],'平均成本定價以 P=AC，使廠商損益兩平。');
O('第十章','皮考克與魏斯曼認為社會發生動亂時，會使政府公共支出急速增加，此稱為：','位移效果',['集中效果','扭曲效果','檢視效果'],'重大事件使人民願意承受更高稅負，公共支出階梯式上升。');
O('第十章','事件具有全國性質或規模經濟，須由中央政府承擔解決，稱為：','集中效果',['檢視效果','位移效果','扭曲效果'],'集中效果是支出責任向中央集中。');
O('第十章','華格納政府活動遞增法則認為，公共支出的所得彈性會：','大於1',['等於1','等於0','大於0'],'華格納法則認為公共支出成長速度快於所得。');
O('第十章','納稅人極力爭取政府擴大支出，卻遺忘支出擴大會提高稅負，稱為：','財政幻覺',['財政剩餘','擴張性財政','排擠效果'],'財政幻覺是只看支出利益而忽略租稅負擔。');
O('第十章','根據皮寇克與魏斯曼分析，造成公共支出增加的原因，不包括：','外溢效果',['審查效果','位移效果','集中效果'],'三個效果為位移、檢查、集中。');
O('第十章','華格納法則說明政府支出增加速度與所得增加速度的關係是：','前者大於後者',['後者大於前者','二者相同','二者無關'],'公共支出的所得彈性大於一。');
O('第十章','政府規模會因重大事件之位移效果而成長，是由何人提出？','Peacock 和 Wiseman',['Niskanen 和 Wiseman','Peacock 和 Tiebout','Niskanen 和 Tiebout'],'位移效果是 Peacock 與 Wiseman 的觀點。');
O('第十章','政府支出絕對量與對國民所得相對量都隨時間增加，稱為：','華格納法則',['畢固法則','馬歇爾法則','包默法則'],'華格納法則描述公共支出隨經濟發展擴大。');
O('第十章','華格納解釋公共支出不斷成長的主要原因是：','對公共支出之需求的所得彈性高',['對公共支出之需求的所得彈性低','財政幻覺','制輪效果'],'所得提高後，對公共服務需求增加且彈性高。');
