<!doctype html><html lang='zh-Hant'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>期末隨機考題</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;background:#f6f7fb;color:#111827;margin:0;padding:28px}div{max-width:680px;margin:auto;background:#fff;border:1px solid #dbe3ef;border-radius:20px;padding:22px;box-shadow:0 12px 30px #0f172a12}b{font-size:24px}</style></head><body><div><b>期末隨機考題載入中...</b><p>若停在這頁，請重新整理一次。</p></div><script>(async()=>{try{let b='';for(let i=0;i<=8;i++){b+=await fetch('data/c'+i+'.txt',{cache:'no-store'}).then(r=>r.text())}b=b.trim();const bin=atob(b);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);if(!('DecompressionStream' in window)){document.body.innerHTML=`<div><b>瀏覽器版本太舊</b><p>請改用 iPad Safari 最新版，或下載 HTML 檔案版。</p></div>`;return}const ds=new DecompressionStream('gzip');const out=new Response(new Blob([arr]).stream().pipeThrough(ds));const html=await out.text();document.open();document.write(html);document.close()}catch(e){document.body.innerHTML=`<div><b>載入失敗</b><p>${String(e)}</p><p>請重新整理，或改用下載版 HTML。</p></div>`}})();</script></body></html>
